# attributed `daemon_stage_saturated` to Week 5; the actual landing
# was Week 6 per ADR-0065 D355 + the per-pillar-week trajectory at
# ADR-0060 D332 — the W6 follow-up corrects the attribution below;
# Pillar H Week 9 extends the carry-forwards with the W8-9 actual
# landing of the per-event-class index panel #6 per ADR-0067 D363):
#
# - Week 5 (DaemonRunner.run body + per-stage worker pool SKELETON):
#   ships the body that consumes per-stage Semaphores at Step 6 +
#   the per-observability-stage span loop via `observability.traced_stage`;
#   NO `daemon_stage_saturated` event class yet (Week 6 ships it).
# - Week 6 (per-stage worker pool ACTUAL parallelism per ADR-0065
#   D353-D355): adds the `daemon_stage_saturated` event class to
#   wire panel 2 + the per-funnel-stage `asyncio.Semaphore` bounded
#   by `DaemonConfig.parallelism_limits` + the
#   `build_daemon_stage_saturated_payload` factory; the panel 2
#   placeholder `or vector(0)` no longer fires once Week 7+ actual
#   per-stage dispatch begins saturating Semaphores.
# - Week 7 (reload_policy body + SIGHUP): adds a per-policy-reload
#   panel showing the `policy_reloaded` event rate + the prior +
#   new content hash diff visualization.
# - Week 8 (per-event-class index materialization at startup per
#   ADR-0067 D359-D361): ships the EventClassIndex +
#   PersonEventIndex mutable holders + _materialize_indexes
#   single-walk helper + init_daemon Step 8 wiring. No new panel
#   at Week 8 (the panel is index-age + ships at Week 9).
# - Week 9 (per-event-class index invalidation on Ledger.append
#   per ADR-0067 D362 + freshness gauge per ADR-0067 D363):
#   ADDED Panel #6 above rendering `time() -
#   outreach_factory_daemon_index_last_updated_timestamp` per the
#   observable gauge registered at
#   observability.register_daemon_index_observable_gauge at
#   init_daemon Step 9.5. The gauge is set at materialization
#   (Step 8) + advanced on every Ledger.append via the
#   per-event-class index invalidation observer per ADR-0067 D362
#   installed at init_daemon Step 8.5.
# - Week 10-11 (crash recovery hardening per ADR-0068 D364-D366):
#   ADDED Panel #7 above rendering the `daemon_stopped` event's
#   exit_reason distribution (clean / timeout / crash) per ADR-0062
#   D344's pre-reserved closed-set + ADR-0014 D33 crash-recovery
#   synthesis at `init_daemon` Step 4.5 via NEW
#   `_recover_from_prior_crash` helper. The helper synthesizes
#   `daemon_stopped(exit_reason="crash", _recovered_by="reconcile")`
#   events for any prior daemon_started events lacking matching
#   daemon_stopped events (matched by PID); the R032 synthetic-event
#   exclusion per ADR-0056 D311's `_recovered_by` filter naturally
#   excludes them from Pillar G SLO aggregation. The Step 4.6 NEW
#   operator-deliberate `reconcile_passes_at_startup` opt-in invokes
#   Pass A (or broader) at startup for orphan send_intent recovery
#   per ADR-0014 D33 + ADR-0015 — the per-tick dispatch via Pillar
#   H Week 7's dispatch_fn IS the structural backstop; pre-flight
#   is operator convenience.
# - Week 12 (Stable flip): the binding exit-criterion test verifies
#   operators see the 24h-uptime + zero-anomaly + crash-recovery
#   signals via this dashboard.
