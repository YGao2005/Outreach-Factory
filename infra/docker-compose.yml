# Single-tenant default OSS bring-up (Pillar I Week 3, ADR-0070 D372 + ADR-0072).
#
#   git clone && docker compose up
#
# starts ONE daemon process (one container == one daemon per ADR-0060 D335
# invariant 1) reading a bind-mounted ledger / vault / policy directory. This is
# the canonical single-tenant-first default per the trajectory commitment in
# ADR-0070 (single-tenant operators get the full Pillar A-H feature set with zero
# multi-tenant ceremony).
#
# Multi-tenant operators do NOT edit this file by hand — they serialize
# multi_tenant.build_per_tenant_compose_config(registry) to a generated compose
# file that fans one isolated daemon service out per tenant.
services:
  daemon:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: outreach-factory:latest
    container_name: outreach-factory-daemon
    environment:
      OUTREACH_FACTORY_LEDGER_DIR: /data/ledger
      OUTREACH_FACTORY_VAULT_DIR: /data/vault
      OUTREACH_FACTORY_POLICY_DIR: /data/policy
    volumes:
      - ./data/ledger:/data/ledger
      - ./data/vault:/data/vault
      - ./data/policy:/data/policy
    restart: unless-stopped
