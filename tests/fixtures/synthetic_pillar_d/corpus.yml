# Pillar D Week 12 — 100-message synthetic inbox corpus
#
# THE binding exit-criterion test substrate per PILLAR-PLAN §2:
#   "100-message synthetic inbox classifier benchmark with documented
#    rule precision/recall; suppression updates idempotent; attribution
#    funnel reproducible."
#
# Per ADR-0031 D136. See sibling README.md for distribution + schema.
#
# Maintenance: when a factory pattern changes, audit this corpus for
# matching rows. When the dispatch priority changes, audit adversarial.
#
# Defaults applied by the conftest builder when a field is omitted:
#   expected_method: rule (overridden to llm for uncategorized rows)
#   subject: ""
#   snippet: ""
#   adversarial: false
#   multi_touch_count: 1
#   cross_channel_extra: null
#   days_ago: 7
#   closed_won_booking: false
#   llm_predicted_category: null

version: 1

messages:

  # ===========================================================
  # UNSUBSCRIBE — 30 messages (legal-liability path)
  # Distribution: 20 email + 5 li_dm + 5 tw_dm
  # Every message MUST match at least one factory unsubscribe-pattern.
  # ===========================================================

  # ----- email × unsubscribe — 20 messages -----
  - {id: m_001, person_id: p_unsub_em_01, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi from us", body: "please unsubscribe",
     notes: "Pattern 1 — direct unsubscribe verb"}
  - {id: m_002, person_id: p_unsub_em_02, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: intro", body: "unsub",
     notes: "Pattern 2 — unsub shorthand"}
  - {id: m_003, person_id: p_unsub_em_03, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hello", body: "remove me from your list",
     notes: "Pattern 3 — remove me from your list"}
  - {id: m_004, person_id: p_unsub_em_04, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: outreach", body: "Please take me off your mailing list.",
     notes: "Pattern 3b — take me off list"}
  - {id: m_005, person_id: p_unsub_em_05, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: pitch", body: "please stop emailing me",
     notes: "Pattern 4 — please stop emailing"}
  - {id: m_006, person_id: p_unsub_em_06, channel: email, reply_event_type: reply_received,
