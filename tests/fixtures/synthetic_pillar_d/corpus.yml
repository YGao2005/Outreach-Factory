  - {id: m_011, person_id: p_unsub_em_11, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi", body: "Please. Stop emails.",
     notes: "Pattern 7 — stop emails (imperative, sentence-start)"}
  - {id: m_012, person_id: p_unsub_em_12, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi", body: "no more emails",
     notes: "Pattern 8 — no more emails"}
  - {id: m_013, person_id: p_unsub_em_13, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "STOP", body: "STOP",
     notes: "Pattern 9 — SMS-style STOP (line-anchored)"}
  - {id: m_014, person_id: p_unsub_em_14, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi", body: "leave me alone",
     notes: "Pattern 10 — leave me alone"}
  - {id: m_015, person_id: p_unsub_em_15, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi", body: "remove me from the mailing",
     notes: "Pattern 11 — remove from the mailing"}
  - {id: m_016, person_id: p_unsub_em_16, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi", body: "unsubscribe me",
     notes: "Pattern 12 — unsubscribe me (also fires pattern 1)"}
  # adversarial: mixed-signal "interested but unsubscribe me" — unsubscribe MUST win per DISPATCH_PRIORITY
  - {id: m_017, person_id: p_unsub_em_17, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi", body: "Sounds interesting but please unsubscribe me.",
     adversarial: true,
     notes: "Adversarial: interest signal + unsubscribe → unsubscribe wins per ADR-0027 D110"}
  # adversarial: unsubscribe phrase inside an OOO-style reply — unsubscribe MUST win
  - {id: m_018, person_id: p_unsub_em_18, channel: email, reply_event_type: reply_received,
