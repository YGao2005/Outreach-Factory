  - {id: m_008, person_id: p_unsub_em_08, channel: email, reply_event_type: reply_received,
     expected_category: unsubscribe, subject: "Re: hi", body: "do not write back",
     notes: "Pattern 5b — do not write back"}
  - {id: m_009, person_id: p_unsub_em_09, channel: email, reply_event_type: reply_received,
