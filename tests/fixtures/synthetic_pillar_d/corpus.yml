  # ===========================================================
  # UNCATEGORIZED — 10 messages (LLM-fallback trigger surface)
  # All 10 are LinkedIn INVITE acceptances (no body — naturally
  # uncategorized per the classifier's empty-text → no-pattern-match
  # behavior). The LLM fallback predicts "interest" for each
