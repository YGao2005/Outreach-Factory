# ===========================================================
# Scenario substrate — APPLIED BY THE CONFTEST BUILDER
# (per-message overrides keyed by person_id; the builder
# merges these into the per-message settings)
# ===========================================================

scenarios:

  # Multi-touch attribution per ADR-0030 D131 — 10 prospects with
  # 2-3 confirmed same-channel touches before reply. Outcome MUST
  # attribute to the MOST-RECENT same-channel touch.
  multi_touch:
    p_unsub_em_01: 3
    p_int_em_01:   2
    p_int_em_02:   3
    p_rej_em_01:   2
    p_rej_em_02:   3
    p_ooo_em_01:   2
    p_wp_em_01:    2
    p_unsub_li_01: 2
    p_int_li_01:   3
    p_rej_tw_01:   2

  # Cross-channel attribution per ADR-0030 D131 — 5 prospects with
  # touches on BOTH email and linkedin BEFORE reply. The conftest
  # builder seeds an extra touch on the OTHER channel. The reply
  # lands on the original channel; the outcome MUST attribute to the
  # SAME-CHANNEL touch (NOT the cross-channel touch).
  cross_channel:  # person_id → extra channel to seed
    p_unsub_em_02: linkedin   # email reply; also has earlier linkedin touch
    p_rej_em_03:   linkedin
    p_int_em_03:   linkedin
    p_unsub_li_02: email       # linkedin reply; also has earlier email touch
    p_int_li_02:   email

  # TTL-driven dormancy per ADR-0030 D132 — 5 prospects with replies
  # dated 60 days ago in non-terminal state. The classifier puts
  # them in `active` (interest); the TTL driver in Pass N transitions
  # them to `dormant` because last_activity > 30-day TTL.
  ttl_dormant_days_ago:  # person_id → days_ago override for the reply
    p_int_em_07: 60
    p_int_em_08: 60
    p_int_em_09: 60
    p_int_em_10: 60
    p_int_em_11: 60

  # Closed_won attribution per ADR-0030 D131 — 3 prospects with
  # category=interest + a calendar_booking_confirmed 3 days after
  # the reply. Pass O MUST emit `closed_won` outcomes attributing
  # to the most-recent same-channel touch before the booking.
  closed_won:  # person_id → days after reply to seed the booking
    p_int_em_01: 3
    p_int_em_02: 3
    p_int_em_03: 3
