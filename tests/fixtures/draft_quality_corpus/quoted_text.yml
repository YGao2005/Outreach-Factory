# Pillar F Week 7 — quoted_text per-claim-type corpus per ADR-0044.
#
# Measures the Layer 3 parser's per-claim-type FP/FN rates against
# operator-judgment ground truth. See sibling README.md for the
# corpus structure + maintenance discipline.
#
# NOTE: quoted_text cross-reference requires VERBATIM (token-for-
# token) match per ADR-0043 D214; fuzzy match defers to Week 8+.
# The 'ready' pairs ship dossiers with verbatim quote substrings;
# the 'refused' pairs ship paraphrased dossiers.

version: 1
claim_type: quoted_text
register: cold-pitch
channel: email

pairs:

  # ---------------------------------------------------------------
  # READY — quoted_text appears verbatim in dossier.
  # ---------------------------------------------------------------

  - id: qtxt-r-001
    draft: 'Loved your line "agents replace consultants" — bold thesis.'
    dossier: |
      Quote: agents replace consultants — see https://example.com/post.
    expected_state: ready
    notes: "Verbatim quote in dossier"

  - id: qtxt-r-002
    draft: 'Your "ship the demo first" framing resonated.'
