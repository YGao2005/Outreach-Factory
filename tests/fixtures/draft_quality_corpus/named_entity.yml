    notes: "Paraphrased-ready W11: four-word entity + comma break; fuzzy cosine 0.879"

  - id: nent-r-p-004
    draft: "Excited by Beacon Software Solutions Inc release."
    dossier: |
      Beacon Software Solutions, Inc. shipped a release. https://beacon.example.com
    expected_state: ready
