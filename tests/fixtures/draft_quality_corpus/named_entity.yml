  - id: nent-r-p-005
    draft: "Saw what Foo Bar Software Inc is doing."
    dossier: |
      Foo Bar Software, Inc. is announcing their plans. https://foosoft.example.com
    expected_state: ready
    notes: "Paraphrased-ready W11: four-word entity + comma break + matching verb phrasing; fuzzy cosine 0.860"

  - id: nent-r-p-006
    draft: "Excited by Vertex AI Labs Inc findings."
    dossier: |
      Vertex AI Labs, Inc. shared their findings. https://vertex.example.com
