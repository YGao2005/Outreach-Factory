  # ---------------------------------------------------------------
  # PARAPHRASED-READY — Week 11 extension per ADR-0048 D252-D255.
  # These pairs exercise fuzzy match's WIN case per ADR-0046 D242:
  # the deterministic substring path returns None (the claim text
  # is NOT a substring of the dossier), then the Week 9 fuzzy path
  # activates + correctly cites at threshold 0.85 per ADR-0046 D239.
  # Per-pair empirical cosine verified at Week 11 commit time to
  # hit cosine >= 0.85 against the framework default encoder
  # (BAAI/bge-small-en-v1.5 per ADR-0039 D188). Per ADR-0048 D255
  # — every paraphrased-ready pair uses a 3+ token entity with a
  # comma-break inside the entity (e.g., "Acme Robotics, Inc.")
  # to break substring while preserving all claim tokens for the
  # cosine-similarity computation.
  # ---------------------------------------------------------------

  - id: nent-r-p-001
    draft: "Saw what Acme Robotics Inc is shipping."
    dossier: |
      Acme Robotics, Inc. is announcing their plans. https://acme.example.com
    expected_state: ready
    notes: "Paraphrased-ready W11: comma break (Acme Robotics Inc → Acme Robotics, Inc.); fuzzy cosine 0.859"

  - id: nent-r-p-002
    draft: "Excited by Meta AI Research Inc work."
    dossier: |
      Meta AI Research, Inc. shared their work. https://meta.example.com
    expected_state: ready
    notes: "Paraphrased-ready W11: comma break inside four-word entity; fuzzy cosine 0.879"

  - id: nent-r-p-003
    draft: "Saw what Foo Bar Robotics Inc announced."
    dossier: |
      Foo Bar Robotics, Inc. announced their plans. https://foobar.example.com
