# Pillar F Week 7 — you_phrase per-claim-type corpus per ADR-0044.
#
# Measures the Layer 3 parser's per-claim-type FP/FN rates against
# operator-judgment ground truth. See sibling README.md for the
# corpus structure + maintenance discipline.
#
# NOTE: you-phrase cross-reference is SUBSTRING-based (per ADR-0043
# D214); the parser matches if the literal "you VERB ..." span
# appears in the dossier. Operators' research dossiers typically
# rephrase to third-person, so realistic 'ready' pairs are sparse;
# the corpus includes artificial constructions where the operator
# pre-copied the prospect's you-phrase into the dossier (the
# verbatim-quote path) + realistic 'refused' pairs where the
# dossier paraphrases.

version: 1
claim_type: you_phrase
register: cold-pitch
channel: email

pairs:

  # ---------------------------------------------------------------
  # READY — you_phrase substring appears in dossier.
  # ---------------------------------------------------------------

  - id: yphr-r-001
    draft: "Saw that you posted about X."
    dossier: |
      Quote: "you posted about X" — see https://example.com/post.
    expected_state: ready
    notes: "Verbatim you-phrase in dossier with URL"

  - id: yphr-r-002
    draft: "Excited you launched the product."
    dossier: |
      Captured quote: you launched the product. Source: https://example.com.
    expected_state: ready
    notes: "Verbatim you-phrase + source URL"

  - id: yphr-r-003
    draft: "Loved that you raised the round."
    dossier: |
      Source quote: "you raised the round" — https://example.com/raise.
    expected_state: ready
    notes: "Verbatim quote with URL"

  - id: yphr-r-004
    draft: "Following up — you announced the partnership."
    dossier: |
      Direct quote: "you announced the partnership" → https://example.com/announce.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-005
    draft: "Saw you tweeted the news."
    dossier: |
      Quote captured: "you tweeted the news" (https://twitter.example.com/post).
    expected_state: ready
    notes: "Verbatim quote with URL"

  - id: yphr-r-006
    draft: "Excited that you shared the framework."
    dossier: |
      "you shared the framework" — see https://github.example.com/framework.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-007
    draft: "Loved you wrote the essay."
    dossier: |
      Quoted: "you wrote the essay" — link: https://essays.example.com.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-008
    draft: "Saw you hired the new lead."
    dossier: |
      Internal note: "you hired the new lead" per https://example.com/hires.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-009
    draft: "Excited you shipped the feature."
    dossier: |
      Direct quote: "you shipped the feature" (see https://changelog.example.com).
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-010
    draft: "Following up — you noted the trend."
    dossier: |
      Source: "you noted the trend" — https://example.com/trends.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-011
    draft: "Saw you mentioned the thesis."
    dossier: |
      Quote: "you mentioned the thesis" → https://blog.example.com/thesis.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-012
    draft: "Excited you published the paper."
    dossier: |
      Captured: "you published the paper" — https://papers.example.com.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-013
    draft: "Loved that you released the demo."
    dossier: |
      Source quote: "you released the demo" (https://demo.example.com).
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-014
    draft: "Saw you said the framework matters."
    dossier: |
      Direct: "you said the framework matters" — https://example.com/talk.
    expected_state: ready
    notes: "Verbatim with URL"

  - id: yphr-r-015
    draft: "Following — you built the system."
    dossier: |
      Quote: "you built the system" — https://github.example.com/system.
    expected_state: ready
    notes: "Verbatim with URL"

  # ---------------------------------------------------------------
  # REFUSED — you_phrase has no verbatim dossier substring match.
  # ---------------------------------------------------------------

  - id: yphr-u-001
    draft: "Saw that you posted about X."
    dossier: |
      Yang posted about X recently. Source: https://example.com/post.
    expected_state: refused
    notes: "Third-person paraphrase; no 'you posted' substring"

  - id: yphr-u-002
    draft: "Excited you launched the product."
    dossier: |
      The product launched last quarter.
    expected_state: refused
    notes: "Passive paraphrase; no 'you launched' substring"

  - id: yphr-u-003
    draft: "Loved that you raised the round."
    dossier: |
      The company raised a round.
    expected_state: refused
    notes: "Third-person; no 'you raised'"

  - id: yphr-u-004
    draft: "Following up — you announced the partnership."
    dossier: |
      Partnership was announced via press release.
    expected_state: refused
    notes: "Passive; no 'you announced'"

  - id: yphr-u-005
    draft: "Saw you tweeted the news."
    dossier: |
      The CEO tweeted the news last week.
    expected_state: refused
    notes: "Third-person paraphrase"

  - id: yphr-u-006
    draft: "Excited that you shared the framework."
    dossier: |
      Their team shared the framework publicly.
    expected_state: refused
    notes: "Third-person team reference"

  - id: yphr-u-007
    draft: "Loved you wrote the essay."
    dossier: |
      The essay was written by the founder.
    expected_state: refused
    notes: "Passive; no 'you wrote'"

  - id: yphr-u-008
    draft: "Saw you hired the new lead."
    dossier: |
      They hired a new engineering lead.
    expected_state: refused
    notes: "Third-person plural; no 'you hired'"

  - id: yphr-u-009
    draft: "Excited you shipped the feature."
    dossier: |
      The feature shipped in v2.
    expected_state: refused
    notes: "Passive shipped; no 'you shipped'"

  - id: yphr-u-010
    draft: "Following — you noted the trend."
    dossier: |
      The team noted an industry trend in their blog.
    expected_state: refused
    notes: "Third-person team; no 'you noted'"

  - id: yphr-u-011
    draft: "Saw you mentioned the thesis."
    dossier: |
      A thesis was mentioned during the talk.
    expected_state: refused
    notes: "Passive; no 'you mentioned'"

  - id: yphr-u-012
    draft: "Excited you published the paper."
    dossier: |
      The paper was published in March 2026.
    expected_state: refused
    notes: "Passive; no 'you published'"

  - id: yphr-u-013
    draft: "Loved that you released the demo."
    dossier: |
      A demo was released last quarter.
    expected_state: refused
    notes: "Passive; no 'you released'"

  - id: yphr-u-014
    draft: "Saw you said the framework matters."
    dossier: |
      Said the framework matters in their talk.
    expected_state: refused
    notes: "Missing 'you'; no 'you said' substring"

  - id: yphr-u-015
    draft: "Following — you built the system."
    dossier: |
      The system was built over six months.
    expected_state: refused
    notes: "Passive built; no 'you built'"
