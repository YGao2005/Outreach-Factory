  # ---------------------------------------------------------------
  # PARAPHRASED-READY — Week 11 extension per ADR-0048 D252-D255.
  # These pairs exercise fuzzy match's WIN case per ADR-0046 D242:
  # the deterministic substring path returns None (the claim text
  # is NOT a substring of the dossier — paraphrased via word-order
  # shift / abbreviation expansion / preposition variation), then
  # the Week 9 fuzzy path activates + correctly cites at threshold
  # 0.85 per ADR-0046 D239. Per-pair empirical cosine verified at
  # Week 11 commit time to hit cosine >= 0.85 against the framework
  # default encoder (BAAI/bge-small-en-v1.5 per ADR-0039 D188).
  # ---------------------------------------------------------------

  - id: devt-r-p-001
    draft: "Following up on the March launch."
    dossier: |
      The launch took place in early March. https://example.com/march-launch
    expected_state: ready
    notes: "Paraphrased-ready W11: bare month + event word-order shift (March launch → launch in early March); fuzzy cosine 0.876"

  - id: devt-r-p-002
    draft: "Loved last week's raise news."
    dossier: |
      The raise from last week was big news. https://example.com/raise
    expected_state: ready
    notes: "Paraphrased-ready W11: relative-time + event word-order shift; fuzzy cosine 0.853"

  - id: devt-r-p-003
    draft: "Loved the August launch."
    dossier: |
      The launch landed in early August. https://example.com/aug-launch
    expected_state: ready
    notes: "Paraphrased-ready W11: bare month + event word-order shift (August launch → launch in early August); fuzzy cosine for dated_event; date_reference 'August' bare-month substring matches dossier verbatim (avoids cross-claim cascade per Week 11 follow-up P2-2 finding — the original Q3 2026 design generated a date_reference 'Q3 2026' claim that fuzzy-missed at 0.85 per ADR-0048 D254's empirical encoder calibration finding)"

  - id: devt-r-p-004
