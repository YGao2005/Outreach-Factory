# Pillar F Week 7 — dated_event per-claim-type corpus per ADR-0044.
#
# Measures the Layer 3 parser's per-claim-type FP/FN rates against
# operator-judgment ground truth. See sibling README.md for the
# corpus structure + maintenance discipline.
#
# NOTE: dated_event extraction has TWO paths per ADR-0043 D214:
#   (1) Direct pattern — `<date> <event-noun>` shapes.
#   (2) Date-near-entity — a named entity within 5 tokens of a
#       date reference.
# Pairs in this file exercise both paths. The state-level
# measurement aggregates extraction + cross-reference for the
# combined gate verdict.

version: 1
claim_type: dated_event
register: cold-pitch
channel: email

pairs:

