    expected_state: refused
    notes: "ISO date missing"

  - id: dref-u-010
    draft: "Your Q4 2024 funding round was bold."
    dossier: |
      Funding history exists but no Q4 2024 entry.
    expected_state: refused
    notes: "Quarter-year absent"

  - id: dref-u-011
    draft: "Excited about your March 2025 essay."
    dossier: |
